<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SuufScan - Sélection du terrain</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #fdf7f0; /* fond doux */
    color: #333;
  }

  h2 {
    margin-bottom: 15px;
    color: #4b3b2a;
  }

  #map {
    height: 500px;
    width: 100%;
    margin-bottom: 15px;
    border: 2px solid #d0b086;
    border-radius: 8px;
  }

  p {
    font-size: 0.95rem;
    margin-bottom: 15px;
  }

  form {
    display: flex;
    flex-direction: column;
    max-width: 400px;
  }

  label {
    font-weight: bold;
    margin-bottom: 5px;
    color: #4b3b2a;
  }

  input {
    padding: 8px;
    margin-bottom: 15px;
    border: 1px solid #d0b086;
    border-radius: 5px;
    font-size: 0.95rem;
  }

  input[readonly] {
    background-color: #f0ead6;
    color: #555;
  }

  button {
    background-color: #d0b086;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.3s;
  }

  button:hover {
    background-color: #bfa16f;
  }
</style>
</head>
<body>

<h2>Sélectionnez l'emplacement du terrain</h2>
<div id="map"></div>
<p>Cliquez sur la carte pour sélectionner le terrain. Les coordonnées et le quartier seront pré-remplis.</p>

<form id="coordinatesForm">
  <label>Latitude: <input type="text" id="lat" name="lat" readonly></label>
  <label>Longitude: <input type="text" id="longitude" name="longitude" readonly></label>
  <label>Quartier / Zone: <input type="text" id="zone" name="zone" readonly></label>
  <button type="submit">Envoyer vers SuufScan</button>
</form>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Carte centrée sur Dakar Plateau
  var map = L.map('map').setView([14.667, -17.435], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var marker;

  // Récupération automatique du quartier/zone via Nominatim
  function getZone(lat, lng) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
      .then(response => response.json())
      .then(data => {
        let zone = data.address.suburb || data.address.city_district || data.address.city || '';
        document.getElementById('zone').value = zone;
      })
      .catch(err => console.log('Erreur reverse geocoding:', err));
  }

  map.on('click', function(e) {
    var lat = e.latlng.lat.toFixed(6);
    var lng = e.latlng.lng.toFixed(6);

    document.getElementById('lat').value = lat;
    document.getElementById('longitude').value = lng;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);

    getZone(lat, lng);
  });

  document.getElementById('coordinatesForm').addEventListener('submit', function(e){
    e.preventDefault();
    const lat = document.getElementById('lat').value;
    const lng = document.getElementById('longitude').value;
    const zone = document.getElementById('zone').value;

    if (!lat || !lng) {
      alert("Veuillez sélectionner un point sur la carte avant d'envoyer.");
      return;
    }

    const jotformURL = `https://form.jotform.com/260693422107049?lat=${lat}&longitude=${lng}&zone=${encodeURIComponent(zone)}`;
    window.open(jotformURL, "_blank");
  });
</script>

</body>
</html>
