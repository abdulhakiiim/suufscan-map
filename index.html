<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuufScan – Phase Test Cas Réel</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:       #f7f3ec;
      --sand:        #e8d9bc;
      --gold:        #c9a96e;
      --gold-dark:   #a07840;
      --brown-light: #d4b896;
      --brown:       #8b6340;
      --text-dark:   #2c1e10;
      --text-mid:    #5a3e28;
      --text-soft:   #9a7a5a;
      --white:       #ffffff;
      --border:      #ddd0b8;
      --success:     #3a7c4e;
      --input-bg:    #fdf8f2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 64px;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--sand);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--text-dark);
      line-height: 1;
    }
    .logo-text span {
      font-size: .72rem;
      color: var(--text-soft);
      font-weight: 300;
    }



    /* ── LAYOUT ── */
    .page-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      height: calc(100vh - 64px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--white);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 12px;
    }

    /* ── CARD ── */
    .card {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }

    .card-label {
      font-size: .78rem;
      color: var(--text-mid);
      font-weight: 500;
      margin-bottom: 6px;
      display: block;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 14px;
      pointer-events: none;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px 12px 10px 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      color: var(--text-dark);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,169,110,.15);
    }
    input[readonly] {
      background: var(--cream);
      color: var(--text-mid);
    }

    /* ── SUBMIT BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(160,120,64,.35);
      letter-spacing: .02em;
    }
    .btn-primary:hover {
      opacity: .93;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(160,120,64,.45);
    }
    .btn-primary:active { transform: translateY(0); }

    /* ── STATUS BADGE ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--cream);
      border: 1px solid var(--border);
      font-size: .82rem;
      color: var(--text-soft);
      transition: background .3s, color .3s;
    }
    .status-row.ready {
      background: #edf7f1;
      border-color: #a8d5bc;
      color: var(--success);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background .3s;
    }
    .status-row.ready .status-dot { background: var(--success); }

    /* ── INFO BOX ── */
    .info-box {
      background: linear-gradient(135deg, #fdf6e8 0%, #faf0da 100%);
      border: 1px solid var(--sand);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: .8rem;
      color: var(--text-mid);
      line-height: 1.55;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .info-box .info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── MAP ── */
    #map {
      height: 100%;
      width: 100%;
      z-index: 0;
    }

    /* Leaflet popup custom */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 8px 24px rgba(0,0,0,.18) !important;
    }

    /* ── PULSE on marker click ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .status-row { animation: fadeIn .3s ease; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .page-grid { grid-template-columns: 1fr; grid-template-rows: auto 300px; height: auto; }
      #map { height: 300px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-icon">🗺️</div>
  <div class="logo-text">
    <h1>SuufScan – Phase Test Cas Réel</h1>
    <span>Votre assistant foncier intelligent</span>
  </div>
</header>



<!-- MAIN -->
<div class="page-grid">

  <!-- SIDEBAR FORM -->
  <aside class="sidebar">

    <div>
      <p class="section-title">📍 Localisation du terrain</p>
      <div class="info-box">
        <span class="info-icon">💡</span>
        <span>Cliquez sur la carte pour sélectionner l'emplacement. Les coordonnées et le quartier seront remplis automatiquement.</span>
      </div>
    </div>

    <div class="card field-group" id="coordinatesForm">
      <div>
        <label class="card-label">Latitude</label>
        <div class="input-wrapper">
          <span class="icon">↕</span>
          <input type="text" id="lat" name="lat" placeholder="Cliquez sur la carte…" readonly>
        </div>
      </div>

      <div>
        <label class="card-label">Longitude</label>
        <div class="input-wrapper">
          <span class="icon">↔</span>
          <input type="text" id="lng" name="lng" placeholder="Cliquez sur la carte…" readonly>
        </div>
      </div>

      <div>
        <label class="card-label">Quartier / Zone</label>
        <div class="input-wrapper">
          <span class="icon">🏘</span>
          <input type="text" id="zone" name="zone" placeholder="Détection automatique…" readonly>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row" id="statusRow">
      <div class="status-dot"></div>
      <span id="statusText">En attente d'une sélection sur la carte</span>
    </div>

    <!-- Submit -->
    <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">
      <span>🔍</span> Envoyer vers SuufScan
    </button>

  </aside>

  <!-- MAP -->
  <main>
    <div id="map"></div>
  </main>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Carte centrée sur Dakar Plateau
  var map = L.map('map').setView([14.667, -17.435], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);

  var marker;

  // Custom marker doré
  var goldIcon = L.divIcon({
    html: `<div style="
      width:28px;height:28px;
      background:linear-gradient(135deg,#c9a96e,#a07840);
      border:3px solid #fff;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      box-shadow:0 4px 12px rgba(0,0,0,.3);
    "></div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 28],
    className: ''
  });

  function setStatus(ready, text) {
    const row = document.getElementById('statusRow');
    const txt = document.getElementById('statusText');
    txt.textContent = text;
    row.classList.toggle('ready', ready);
  }

  function getZone(lat, lng) {
    setStatus(false, 'Détection du quartier…');
    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
      .then(r => r.json())
      .then(data => {
        let zone = data.address.suburb
                || data.address.city_district
                || data.address.neighbourhood
                || data.address.city
                || '';
        document.getElementById('zone').value = zone;
        setStatus(true, `Prêt · ${zone || 'Zone détectée'}`);
      })
      .catch(() => {
        document.getElementById('zone').value = '';
        setStatus(false, 'Impossible de détecter le quartier');
      });
  }

  map.on('click', function(e) {
    var lat = e.latlng.lat.toFixed(6);
    var lng = e.latlng.lng.toFixed(6);
    document.getElementById('lat').value = lat;
    document.getElementById('lng').value = lng;
    document.getElementById('zone').value = '';

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng], { icon: goldIcon })
      .addTo(map)
      .bindPopup(`<b>Terrain sélectionné</b><br>Lat: ${lat}<br>Lng: ${lng}`)
      .openPopup();

    getZone(lat, lng);
  });

  function handleSubmit() {
    const lat  = document.getElementById('lat').value;
    const lng  = document.getElementById('lng').value;
    const zone = document.getElementById('zone').value;

    if (!lat || !lng) {
      setStatus(false, '⚠️ Veuillez d\'abord cliquer sur la carte');
      return;
    }

    const jotformURL = `https://form.jotform.com/260693422107049?lat=${lat}&longitude=${lng}&zone=${encodeURIComponent(zone)}`;
    window.open(jotformURL, '_blank');
  }
</script>
</body>
</html>
