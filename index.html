<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SuufScan - Sélection du terrain</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  #map { height: 500px; width: 100%; margin-bottom: 10px; }
  body { font-family: Arial, sans-serif; margin: 20px; }
  h2 { margin-bottom: 10px; }
  input { width: 300px; margin-bottom: 5px; }
</style>
</head>
<body>

<h2>Sélectionnez l'emplacement du terrain</h2>
<div id="map"></div>
<p>Cliquez sur la carte pour sélectionner le terrain. Les coordonnées et le quartier seront pré-remplis.</p>

<form id="coordinatesForm">
  <label>Latitude: <input type="text" id="lat" name="lat" readonly></label><br>
  <label>Longitude: <input type="text" id="lng" name="longitude" readonly></label><br>
  <label>Quartier / Zone: <input type="text" id="zone" name="zone" readonly></label><br>
  <button type="submit">Envoyer vers SuufScan</button>
</form>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Carte centrée sur Dakar Plateau
  var map = L.map('map').setView([14.667, -17.435], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  var marker;

  // Récupérer automatiquement le quartier/zone via Nominatim
  function getZone(lat, lng) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
      .then(response => response.json())
      .then(data => {
        let zone = data.address.suburb || data.address.city_district || data.address.city || '';
        document.getElementById('zone').value = zone;
      })
      .catch(err => console.log('Erreur reverse geocoding:', err));
  }

  // Clic sur la carte
  map.on('click', function(e) {
    var lat = e.latlng.lat.toFixed(6);
    var lng = e.latlng.lng.toFixed(6);

    document.getElementById('lat').value = lat;
    document.getElementById('lng').value = lng;

    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);

    getZone(lat, lng);
  });

  // Soumettre le formulaire et ouvrir Jotform avec pré-remplissage
  document.getElementById('coordinatesForm').addEventListener('submit', function(e){
    e.preventDefault();
    const lat = document.getElementById('lat').value;
    const lng = document.getElementById('lng').value;
    const zone = document.getElementById('zone').value;

    if (!lat || !lng) {
      alert("Veuillez sélectionner un point sur la carte avant d'envoyer.");
      return;
    }

    // Pré-remplissage URL Jotform avec noms exacts des champs
    const jotformURL = `https://form.jotform.com/260693422107049?lat=${lat}&longitude=${lng}&zone=${encodeURIComponent(zone)}`;
    window.open(jotformURL, "_blank");
  });
</script>

</body>
</html>
